# ═══════════════════════════════════════════════════════════
# Nginx Configuration for Voice & Video Cloner
# Copy to: /etc/nginx/sites-available/voice-cloner
# ═══════════════════════════════════════════════════════════
#
# This file is auto-configured by ec2-setup.sh.
# Edit manually only if you need custom domain / SSL.

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP _;

    # Allow large video uploads (200 MB)
    client_max_body_size 200M;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # ── Static files (Nginx serves directly) ──
    location /static/ {
        alias /home/ubuntu/voice-video-cloner/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Main app proxy ──
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
    }

    # ── Download endpoint (long timeout for large files) ──
    location /api/download/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}

# ═══════════════════════════════════════════════════════════
